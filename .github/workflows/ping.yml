name: keep-alive
# Reliable warm-keeper for the Render free backend. GitHub's `schedule` is
# throttled to every few HOURS for low-activity repos (useless against a 15-min
# sleep), so instead we run ONE long job that pings every 10 minutes for ~5h40m,
# then re-dispatches itself — giving near-continuous coverage 24/7. The schedule
# below is only a backstop to restart the loop if it ever dies.
on:
  workflow_dispatch: {}
  schedule:
    - cron: '7 */5 * * *'
concurrency:
  group: keepalive
  cancel-in-progress: false
permissions:
  actions: write
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Ping every 10 minutes
        run: |
          URL="https://bagrut-math-api-img.onrender.com/health"
          for i in $(seq 1 42); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo 000)
            echo "$(date -u +%H:%M:%S) ping #$i -> HTTP $code"
            sleep 480
          done
      - name: Re-dispatch self (continuous loop)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/actions/workflows/ping.yml/dispatches" -f ref=main \
            && echo "re-dispatched keep-alive loop" || echo "re-dispatch failed (schedule backstop will restart)"
