name: keep-alive
# Pings the Render free-tier backend so it doesn't sleep (avoids cold-start 503s
# on shoresh.1bigfam.com / bagrut.1bigfam.com). Public repo = free unlimited
# Actions minutes. Render sleeps after ~15min idle, so we ping every 12min.
on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          set -e
          URL="https://bagrut-math-api-img.onrender.com/health"
          echo "Pinging $URL"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/r.txt -w "%{http_code}" --max-time 90 "$URL" || echo 000)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then cat /tmp/r.txt; echo; exit 0; fi
            sleep 20
          done
          echo "backend did not return 200 (will retry next cycle)"; exit 0
